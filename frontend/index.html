<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Mock Interview Coach</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; font-size: 2rem; color: #38bdf8; margin-bottom: 8px; }
    p.subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; }
    .card { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; color: #94a3b8; font-size: 0.9rem; }
    select { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 1rem; margin-bottom: 16px; }
    button { padding: 12px 24px; border-radius: 8px; border: none; font-size: 1rem; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .btn-primary { background: #38bdf8; color: #0f172a; width: 100%; }
    .btn-primary:hover { background: #0ea5e9; }
    .hidden { display: none; }
    .selects { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    #chatBox { height: 380px; overflow-y: auto; background: #0f172a; border-radius: 10px; padding: 16px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 0.95rem; }
    .msg.ai { background: #1e3a5f; color: #e2e8f0; align-self: flex-start; border-bottom-left-radius: 2px; }
    .msg.user { background: #38bdf8; color: #0f172a; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
    .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .input-row input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 1rem; }
    .input-row button { width: auto; background: #38bdf8; color: #0f172a; }
    .typing { color: #94a3b8; font-size: 0.85rem; padding: 4px 8px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .btn-danger { background: #ef4444; color: white; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
    .score-box { background: #0f172a; border-left: 4px solid #22c55e; padding: 16px; border-radius: 8px; white-space: pre-wrap; line-height: 1.8; margin-bottom: 16px; }
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-green { background: #22c55e; color: #0f172a; width: 100%; }
    .btn-green:hover { background: #16a34a; }

    /* Timer */
    .timer-bar { background: #0f172a; border-radius: 8px; padding: 8px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
    .timer-text { font-size: 1.2rem; font-weight: 700; min-width: 48px; }
    .timer-text.green { color: #22c55e; }
    .timer-text.yellow { color: #facc15; }
    .timer-text.red { color: #ef4444; }
    .progress-bar { flex: 1; height: 8px; background: #334155; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 1s linear, background 1s; }

    /* Difficulty badge */
    .difficulty-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; margin-left: 10px; }
    .easy { background: #166534; color: #86efac; }
    .medium { background: #854d0e; color: #fde68a; }
    .hard { background: #7f1d1d; color: #fca5a5; }

    /* Voice button */
    .btn-voice { background: #7c3aed; color: white; width: auto; padding: 12px 16px; }
    .btn-voice.recording { background: #ef4444; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 AI Mock Interview Coach</h1>
    <p class="subtitle">Have a real conversation with your AI interviewer</p>

    <!-- Setup -->
    <div class="card" id="setupCard">
      <h2 style="margin-bottom:16px; color:#38bdf8">Setup Your Interview</h2>
      <div class="selects">
        <div>
          <label>Interview Type</label>
          <select id="type">
            <option value="HR">HR (Tell me about yourself...)</option>
            <option value="DSA">DSA (Explain concepts verbally)</option>
            <option value="System Design">System Design</option>
            <option value="Python">Python concepts</option>
            <option value="JavaScript">JavaScript concepts</option>
          </select>
        </div>
        <div>
          <label>Starting Difficulty</label>
          <select id="difficulty">
            <option value="easy">Easy (Fresher)</option>
            <option value="medium">Medium (1-2 years)</option>
            <option value="hard">Hard (Senior)</option>
          </select>
        </div>
      </div>
      <button class="btn-primary" onclick="startInterview()">Start Interview 🎙️</button>
    </div>

    <!-- Chat -->
    <div class="card hidden" id="chatCard">
      <div class="top-bar">
        <div>
          <span style="color:#38bdf8; font-weight:700; font-size:1.1rem">Interview 🎙️</span>
          <span class="difficulty-badge" id="diffBadge">Easy</span>
        </div>
        <button class="btn-danger" onclick="endInterview()">End & Get Score</button>
      </div>

      <!-- Timer -->
      <div class="timer-bar">
        <span>⏱️</span>
        <span class="timer-text green" id="timerText">60</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:100%; background:#22c55e;"></div>
        </div>
      </div>

      <div id="chatBox"></div>
      <div id="typingIndicator" class="typing hidden">AI is thinking...</div>
      <div class="input-row">
        <input type="text" id="userInput" placeholder="Type your answer or use mic..." onkeydown="if(event.key==='Enter') sendMessage()"/>
        <button class="btn-voice" id="voiceBtn" onclick="toggleVoice()" title="Click to speak">🎤</button>
        <button onclick="sendMessage()" style="background:#38bdf8; color:#0f172a; width:auto;">Send ➤</button>
      </div>
      <div id="voiceStatus" class="typing hidden" style="color:#7c3aed;">🎤 Listening... speak now</div>
    </div>

    <!-- Score -->
    <div class="card hidden" id="scoreCard">
      <h2 style="margin-bottom:16px; color:#22c55e">📊 Interview Results</h2>
      <div class="score-box" id="scoreText"></div>
      <div class="action-row">
        <button class="btn-green" onclick="downloadPDF()">⬇️ Download as PDF</button>
        <button class="btn-primary" onclick="newInterview()">🔄 New Interview</button>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://mock-interview-coach-1.onrender.com';
    let history = [];
    let interviewType = '';
    let currentDifficulty = 'easy';
    let chatLog = [];
    let scores = [];
    let timerInterval = null;
    let timeLeft = 60;
    let recognition = null;
    let isRecording = false;

    // ── Difficulty auto-adjust ──
    const DIFFICULTY_ORDER = ['easy', 'medium', 'hard'];

    function adjustDifficulty(score) {
      const idx = DIFFICULTY_ORDER.indexOf(currentDifficulty);
      if (score >= 8 && idx < 2) {
        currentDifficulty = DIFFICULTY_ORDER[idx + 1];
        showDifficultyChange(`Great answer! Difficulty increased to ${currentDifficulty} 📈`);
      } else if (score <= 4 && idx > 0) {
        currentDifficulty = DIFFICULTY_ORDER[idx - 1];
        showDifficultyChange(`Difficulty adjusted to ${currentDifficulty} 📉`);
      }
      updateBadge();
    }

    function showDifficultyChange(msg) {
      const box = document.getElementById('chatBox');
      const div = document.createElement('div');
      div.style.cssText = 'text-align:center; color:#facc15; font-size:0.85rem; padding:6px; background:#1e293b; border-radius:8px;';
      div.innerText = msg;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function updateBadge() {
      const badge = document.getElementById('diffBadge');
      badge.className = `difficulty-badge ${currentDifficulty}`;
      badge.innerText = currentDifficulty.charAt(0).toUpperCase() + currentDifficulty.slice(1);
    }

    // ── Timer ──
    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = 60;
      updateTimer();
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimer();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          addMessage('ai', "⏰ Time's up! Let's move to the next question.");
          history.push({ role: 'assistant', content: "Time's up! Let's move to the next question." });
          chatLog.push({ role: 'Interviewer', text: "Time's up! Let's move to the next question." });
        }
      }, 1000);
    }

    function updateTimer() {
      const el = document.getElementById('timerText');
      const fill = document.getElementById('progressFill');
      el.innerText = timeLeft;
      const pct = (timeLeft / 60) * 100;
      fill.style.width = pct + '%';
      if (timeLeft > 30) {
        el.className = 'timer-text green';
        fill.style.background = '#22c55e';
      } else if (timeLeft > 15) {
        el.className = 'timer-text yellow';
        fill.style.background = '#facc15';
      } else {
        el.className = 'timer-text red';
        fill.style.background = '#ef4444';
      }
    }

    // ── Voice Input ──
    function toggleVoice() {
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        alert('Voice input is not supported in your browser. Please use Chrome!');
        return;
      }
      if (isRecording) {
        recognition.stop();
        return;
      }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'en-IN';
      recognition.interimResults = false;

      recognition.onstart = () => {
        isRecording = true;
        document.getElementById('voiceBtn').classList.add('recording');
        document.getElementById('voiceBtn').innerText = '⏹️';
        document.getElementById('voiceStatus').classList.remove('hidden');
      };

      recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript;
        document.getElementById('userInput').value = transcript;
      };

      recognition.onend = () => {
        isRecording = false;
        document.getElementById('voiceBtn').classList.remove('recording');
        document.getElementById('voiceBtn').innerText = '🎤';
        document.getElementById('voiceStatus').classList.add('hidden');
      };

      recognition.start();
    }

    // ── Interview flow ──
    async function startInterview() {
      interviewType = document.getElementById('type').value;
      currentDifficulty = document.getElementById('difficulty').value;
      scores = [];
      history = [];
      chatLog = [];

      document.getElementById('setupCard').classList.add('hidden');
      document.getElementById('chatCard').classList.remove('hidden');
      document.getElementById('scoreCard').classList.add('hidden');
      document.getElementById('chatBox').innerHTML = '';
      updateBadge();

      showTyping(true);
      const res = await fetch(`${API}/start-interview`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ interview_type: interviewType, difficulty: currentDifficulty })
      });
      const data = await res.json();
      showTyping(false);

      addMessage('ai', data.message);
      history.push({ role: 'assistant', content: data.message });
      chatLog.push({ role: 'Interviewer', text: data.message });
      startTimer();
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      clearInterval(timerInterval);

      addMessage('user', text);
      history.push({ role: 'user', content: text });
      chatLog.push({ role: 'You', text });

      // Quick score estimate for difficulty adjustment
      const quickScore = await getQuickScore(text);
      scores.push(quickScore);
      adjustDifficulty(quickScore);

      showTyping(true);
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          history,
          user_message: `[Difficulty level: ${currentDifficulty}] ${text}`
        })
      });
      const data = await res.json();
      showTyping(false);

      addMessage('ai', data.message);
      history.push({ role: 'assistant', content: data.message });
      chatLog.push({ role: 'Interviewer', text: data.message });
      startTimer();
    }

    async function getQuickScore(answer) {
      // Heuristic score based on answer length and keywords
      const words = answer.trim().split(/\s+/).length;
      if (words < 10) return 3;
      if (words < 25) return 6;
      return 8;
    }

    async function endInterview() {
      clearInterval(timerInterval);
      document.getElementById('chatCard').classList.add('hidden');
      document.getElementById('scoreCard').classList.remove('hidden');
      document.getElementById('scoreText').innerText = 'Evaluating your performance...';

      const res = await fetch(`${API}/evaluate-interview`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history })
      });
      const data = await res.json();
      document.getElementById('scoreText').innerText = data.feedback;
      chatLog.push({ role: 'AI Evaluation', text: data.feedback });
    }

    function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFontSize(16);
      doc.setTextColor(0, 120, 200);
      doc.text('AI Mock Interview Report', 20, 20);

      doc.setFontSize(11);
      doc.setTextColor(0, 0, 0);
      doc.text(`Interview Type: ${interviewType}`, 20, 32);
      doc.text(`Final Difficulty: ${currentDifficulty}`, 20, 40);
      doc.text(`Date: ${new Date().toLocaleDateString()}`, 20, 48);

      let y = 60;
      chatLog.forEach(entry => {
        doc.setFontSize(10);
        doc.setTextColor(entry.role === 'You' ? 0 : 0, entry.role === 'You' ? 120 : 0, entry.role === 'You' ? 0 : 180);
        doc.text(`${entry.role}:`, 20, y);
        y += 6;
        doc.setTextColor(50, 50, 50);
        const lines = doc.splitTextToSize(entry.text, 170);
        lines.forEach(line => {
          if (y > 270) { doc.addPage(); y = 20; }
          doc.text(line, 20, y);
          y += 6;
        });
        y += 4;
      });

      doc.save('interview-report.pdf');
    }

    function newInterview() {
      document.getElementById('setupCard').classList.remove('hidden');
      document.getElementById('scoreCard').classList.add('hidden');
      history = [];
      chatLog = [];
      scores = [];
    }

    function addMessage(role, text) {
      const box = document.getElementById('chatBox');
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerText = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function showTyping(show) {
      document.getElementById('typingIndicator').classList.toggle('hidden', !show);
    }
  </script>
</body>
</html>
